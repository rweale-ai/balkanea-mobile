<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=390">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FA; min-height: 100vh; }
  h2 { font-size: 17px; font-weight: 700; color: #1A1A2E; margin-bottom: 4px; text-align: center; }

  .screen { max-width: 390px; margin: 0 auto; padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 20px; }

  /* Lang bar */
  .lang-bar { display: flex; justify-content: flex-end; }
  .lang-toggle { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #E5E7EB; border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #1A1A2E; }
  .flag { width: 20px; height: 14px; border-radius: 2px; background: #003399; }

  /* Logo */
  .logo-section { text-align: center; padding: 8px 0; }
  .logo-box { display: inline-block; background: linear-gradient(135deg, #ED8323, #E57757); border-radius: 16px; padding: 10px 24px; margin-bottom: 10px; }
  .logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .tagline { font-size: 14px; color: #6B7280; }

  /* Card */
  .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
  .card-title { font-size: 20px; font-weight: 700; color: #1A1A2E; text-align: center; margin-bottom: 16px; }

  /* Social */
  .social-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; border-radius: 10px; background: #F8F9FA; border: 1px solid #E5E7EB; font-size: 14px; font-weight: 600; color: #1A1A2E; }
  .g-icon { font-size: 16px; font-weight: 800; color: #4285F4; }
  .apple-icon { font-size: 18px; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .divider-line { flex: 1; height: 1px; background: #E5E7EB; }
  .divider-text { font-size: 12px; color: #9CA3AF; }

  /* Method toggle */
  .method-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .method-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px; border-radius: 10px; background: #F8F9FA; border: 1.5px solid transparent; font-size: 14px; font-weight: 500; color: #6B7280; }
  .method-btn.active { background: #FFF4E8; border-color: #ED8323; color: #ED8323; font-weight: 600; }

  /* Fields */
  .field { margin-bottom: 12px; }
  .label { font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
  .input-wrap { display: flex; align-items: center; background: #F8F9FA; border: 1px solid #E5E7EB; border-radius: 10px; padding: 0 12px; }
  .input-icon { font-size: 16px; margin-right: 8px; color: #9CA3AF; }
  .input { flex: 1; padding: 13px 0; font-size: 15px; color: #1A1A2E; background: none; border: none; outline: none; }
  .input::placeholder { color: #9CA3AF; }

  /* Submit */
  .submit-btn { display: block; text-align: center; background: linear-gradient(to right, #ED8323, #E57757); border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; color: #fff; margin-top: 4px; }

  /* Switch */
  .switch-row { text-align: center; margin-top: 14px; font-size: 14px; color: #6B7280; }
  .switch-link { color: #ED8323; font-weight: 600; }

  /* Skip */
  .skip-btn { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 10px; font-size: 14px; color: #6B7280; }

  /* Version */
  .version { text-align: center; font-size: 11px; color: #9CA3AF; }
</style>
</head><body>
<div class="screen">

  <div class="lang-bar">
    <div class="lang-toggle">
      <div class="flag"></div>
      EN
    </div>
  </div>

  <div class="logo-section">
    <div class="logo-box"><span class="logo-text">balkanea</span></div>
    <div class="tagline">Your AI travel advisor</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>

    <div class="social-row">
      <div class="social-btn"><span class="g-icon">G</span> Google</div>
      <div class="social-btn"><span class="apple-icon">🍎</span> Apple</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="method-row">
      <div class="method-btn active">✉️ Email</div>
      <div class="method-btn">📱 Phone</div>
    </div>

    <div class="field">
      <div class="label">Email</div>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input class="input" placeholder="your@email.com" type="email">
      </div>
    </div>

    <div class="field">
      <div class="label">Password</div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="input" placeholder="••••••••" type="password">
      </div>
    </div>

    <div class="submit-btn">Sign In</div>

    <div class="switch-row">
      Don't have an account? <span class="switch-link">Sign up</span>
    </div>
  </div>

  <div class="skip-btn">Continue without account →</div>
  <div class="version">v1.0.1</div>

</div>
</body></html>
